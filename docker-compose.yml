version: '3.8'

services:
  # Aplikasi Absensi (PHP + Nginx)
  absen-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absen-app
    restart: unless-stopped
    ports:
      - "18082:80"
    environment:
      - TZ=${TZ:-Asia/Makassar}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mandalo1_presensi}
      - MYSQL_USER=${MYSQL_USER:-mandalo1_presensi}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-manoke2004}
    volumes:
      # BIND MOUNT: source code langsung dari host
      # Perubahan kode = langsung terlihat, TANPA rebuild Docker
      - ./:/var/www/html
      # Persistent uploads (foto siswa yg diupload user, terpisah dari git)
      - absen_uploads_data:/var/www/html/uploads/foto
      - absen_uploads_excel:/var/www/html/uploads/excel
    depends_on:
      absen-db:
        condition: service_healthy

  # Database MariaDB
  absen-db:
    image: mariadb:10.11
    container_name: absen-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-absen_root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mandalo1_presensi}
      MYSQL_USER: ${MYSQL_USER:-mandalo1_presensi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-manoke2004}
      TZ: ${TZ:-Asia/Makassar}
    volumes:
      - absen_dbdata:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "18083:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  absen_dbdata:
    name: absen_mysql_data
  absen_uploads_data:
    name: absen_uploads_foto
  absen_uploads_excel:
    name: absen_uploads_excel
