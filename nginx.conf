server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # Ukuran max upload (foto siswa, import Excel)
    client_max_body_size 50m;

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeout lebih lama untuk proses berat (import, generate barcode)
        fastcgi_read_timeout 300;
    }

    # SPA-like: coba file dulu, lalu fallback ke index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache gambar & font (lama karena jarang berubah)
    location ~* \.(?:ico|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    # CSS & JS — jangan cache agresif (pakai query string untuk busting)
    location ~* \.(?:css|js|webmanifest)$ {
        expires 1h;
        access_log off;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Blokir akses ke file sensitif
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~* (?:config\.php|\.env|\.git|\.sql) {
        deny all;
        return 404;
    }
}
